name: Collect Crypto Memory

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-crypto-memory
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Collect Market and Sector Memory
        run: npm run collect

      - name: Commit memory updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshot-history.json
          git add data/sector-history.json
          if git diff --cached --quiet; then
            echo "No memory changes to commit."
          else
            git commit -m "chore: collect crypto memory"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          fi
